name: Build installer

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-installer:
    name: Build Windows installer
    runs-on: windows-2025

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install desktop dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Build installer
        run: npm run dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: disguise-remote-cue-installer
          path: dist/disguise-remote-cue-setup-*.exe
          if-no-files-found: error

      - name: Attach installer to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path dist -Filter 'disguise-remote-cue-setup-*.exe' | Select-Object -First 1
          if (-not $installer) {
            throw 'Installer was not produced.'
          }

          gh release view $env:TAG_NAME --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG_NAME $installer.FullName --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $env:TAG_NAME $installer.FullName --repo $env:GITHUB_REPOSITORY --title $env:TAG_NAME --notes "Installer build for $env:TAG_NAME" --verify-tag
          }
